name: Publish Docker Image

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        id: versions
        run: |
          SVC_VERSION="${GITHUB_REF_NAME#v}"
          DOCXODUS_VERSION=$(grep 'Include="Docxodus"' DocxodusService.csproj | sed 's/.*Version="\([^"]*\)".*/\1/')

          if [ -z "$SVC_VERSION" ] || [ -z "$DOCXODUS_VERSION" ]; then
            echo "::error::Failed to extract versions (service='$SVC_VERSION', docxodus='$DOCXODUS_VERSION')"
            exit 1
          fi

          IMAGE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${SVC_VERSION}-docxodus${DOCXODUS_VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.versions.outputs.image }}:${{ steps.versions.outputs.tag }}
            ${{ env.REGISTRY }}/${{ steps.versions.outputs.image }}:latest
